name: "@codex - Tag @codex in issues and PR comments"

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted, edited]
  pull_request_review_comment:
    types: [created, edited]

jobs:
  codex_mention:
    if: >-
      (
        github.event_name == 'issues' &&
        (
          contains(github.event.issue.title, '@codex') ||
          contains(github.event.issue.body, '@codex')
        )
      ) || (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@codex')
      ) || (
        github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@codex')
      ) || (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@codex')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - name: Run Codex on @codex mention
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            You are responding to a GitHub mention of @codex.
            Repository: ${{ github.repository }}
            Event: ${{ github.event_name }}
            Actor: ${{ github.actor }}

            Issue / PR context:
            - Number: ${{ github.event.issue.number || github.event.pull_request.number }}
            - Title: ${{ github.event.issue.title || github.event.pull_request.title }}
            - URL: ${{ github.event.issue.html_url || github.event.pull_request.html_url }}

            Mention content:
            ${{ github.event.comment.body || github.event.review.body || github.event.issue.body }}

            Provide a concise, actionable response in markdown.

      - name: Post Codex response
        if: steps.run_codex.outputs.final-message != ''
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const issueNumber = context.payload.issue?.number || context.payload.pull_request?.number;
            if (!issueNumber) {
              core.setFailed('No issue or PR number found in payload.');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
